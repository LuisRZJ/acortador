<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acortador de Enlaces</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Acortador de enlaces premium con diseño Material Design 3 e IndexedDB local. Crea, gestiona y analiza tus enlaces.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%231a73e8%22><path d=%22M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z%22/></svg>">
  
  <!-- PWA Settings -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f8f9fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Goo.short">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon.svg">

  <!-- Google Fonts - Outfit & Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Google Material Symbols (Outlined) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  
  <!-- Google Charts Loader -->
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <!-- Estilos del Proyecto -->
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <!-- App Container -->
  <div class="app-layout">
    
    <!-- Top App Bar -->
    <header class="top-app-bar">
      <div class="brand">
        <button id="menu-toggle" class="icon-btn mobile-only" aria-label="Abrir menú de navegación" style="margin-right: 8px;">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <span class="material-symbols-outlined logo-icon">link</span>
        <h1 class="logo-text">Acortador de enlaces</h1>
      </div>
      
      <div class="top-bar-actions">
        <button id="theme-toggle" class="icon-btn" aria-label="Cambiar tema">
          <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
        </button>
      </div>
    </header>

    <!-- Main Navigation Layout -->
    <div class="navigation-content-wrapper">
      
      <!-- Navigation Rail / Drawer (Escritorio) -->
      <nav class="navigation-rail" id="navigation-rail">
        <button class="nav-item active" data-path="/" id="nav-btn-generate">
          <span class="material-symbols-outlined">add_link</span>
          <span class="nav-label">Crear</span>
        </button>
        <button class="nav-item" data-path="/gestion" id="nav-btn-manage">
          <span class="material-symbols-outlined">analytics</span>
          <span class="nav-label">Gestionar</span>
        </button>
        <button class="nav-item" data-path="/analiticas" id="nav-btn-analytics">
          <span class="material-symbols-outlined">monitoring</span>
          <span class="nav-label">Analíticas</span>
        </button>
        <button class="nav-item" data-path="/campanas" id="nav-btn-campaigns">
          <span class="material-symbols-outlined">campaign</span>
          <span class="nav-label">Campañas</span>
        </button>
        <button class="nav-item" data-path="/ajustes" id="nav-btn-settings">
          <span class="material-symbols-outlined">settings</span>
          <span class="nav-label">Ajustes</span>
        </button>
      </nav>

      <!-- Main Content Area -->
      <main class="main-content" id="app-router-view">
        <!-- Las vistas SPA se inyectarán dinámicamente aquí -->
        <div class="page-loader">
          <div class="md-spinner"></div>
        </div>
      </main>
      
    </div>

    <!-- Overlay para el Menú Lateral Desplegable (Móvil) -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    
  </div>


  
  <!-- Script Principal SPA -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
